// ══════════════════════════════════════════════════════════════
//  Rendering
// ══════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════
//  METADATA PARSING — ID3v2 (MP3), MP4 atoms (M4A/AAC), FLAC
// ══════════════════════════════════════════════════════════════
const META_FETCH_BYTES = 1_048_576; // 1 MB — enough for most tags + embedded art

async function fetchPartialAudio(key) {
  try {
    const resp = await S.s3.signedRequest('GET', '/' + key, {
      headers: { range: `bytes=0-${META_FETCH_BYTES - 1}` },
    });
    if (!resp.ok && resp.status !== 206) return null;
    return resp.arrayBuffer();
  } catch { return null; }
}

// ── Persistent metadata cache (survives app relaunches) ──
// Art blobs → OPFS snoozz-art/  |  Text fields → localStorage snoozz_meta

const ART_DIR = 'snoozz-art';
function _artFilename(trackId, mime) { return hashStr(trackId).toString(36) + (mime === 'image/png' ? '.png' : '.jpg'); }

async function saveArtToOPFS(trackId, blob) {
  if (!navigator.storage?.getDirectory) return null;
  try {
    const root = await navigator.storage.getDirectory();
    const dir  = await root.getDirectoryHandle(ART_DIR, { create: true });
    const fname = _artFilename(trackId, blob.type);
    const fh = await dir.getFileHandle(fname, { create: true });
    const wr = await fh.createWritable(); await wr.write(blob); await wr.close();
    return fname;
  } catch (e) { console.warn('saveArt', e.message); return null; }
}

async function loadArtFromOPFS(artKey) {
  if (!navigator.storage?.getDirectory || !artKey) return null;
  try {
    const root = await navigator.storage.getDirectory();
    const dir  = await root.getDirectoryHandle(ART_DIR, { create: false });
    return (await dir.getFileHandle(artKey, { create: false })).getFile();
  } catch { return null; }
}

function getLSMeta() {
  try { return JSON.parse(localStorage.getItem('snoozz_meta') || '{}'); } catch { return {}; }
}
function setLSMeta(trackId, data) {
  try { const all = getLSMeta(); all[trackId] = data; localStorage.setItem('snoozz_meta', JSON.stringify(all)); } catch {}
}

// Called once after crawlTracks builds S.tracks.
// Pre-populates each track with cached text + marks artKey so fetchMetaAll
// can load art from OPFS instead of hitting S3.
function preloadMetaFromCache() {
  const all = getLSMeta();
  for (const t of S.tracks) {
    const m = all[t.id]; if (!m) continue;
    if (m.title)    t.title    = m.title;
    if (m.artist)   t.artist   = m.artist;
    if (m.album)    t.album    = m.album;
    if (m.duration) t.duration = m.duration;
    if (m.artKey)   t._artKey  = m.artKey;
    // _metaCached = true only when we're certain no S3 fetch is needed:
    //   • artKey set → art is in OPFS, path 1 handles it
    //   • noArt confirmed → file has no embedded art, nothing to fetch
    // If artKey is null AND noArt is not set (e.g. a prior failed OPFS save),
    // leave _metaCached unset so fetchTrackMeta falls through to path 3 and retries.
    if (m.artKey || m.noArt) t._metaCached = true;
  }
}

async function parseID3v2(buf) {
  const dv = new DataView(buf);
  const r = { title: null, artist: null, album: null, durationMs: null, coverBlob: null };
  if (dv.byteLength < 10) return r;
  if (String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2)) !== 'ID3') return r;
  const majorVer = dv.getUint8(3);
  const tagSize = ((dv.getUint8(6) & 0x7f) << 21) | ((dv.getUint8(7) & 0x7f) << 14) |
                  ((dv.getUint8(8) & 0x7f) << 7)  |  (dv.getUint8(9) & 0x7f);
  let offset = 10;
  const end = Math.min(10 + tagSize, dv.byteLength);
  while (offset + 10 < end) {
    const fid = String.fromCharCode(dv.getUint8(offset), dv.getUint8(offset+1), dv.getUint8(offset+2), dv.getUint8(offset+3));
    if (!/^[A-Z0-9]{4}$/.test(fid)) break;
    const fsize = majorVer === 4
      ? ((dv.getUint8(offset+4)&0x7f)<<21)|((dv.getUint8(offset+5)&0x7f)<<14)|((dv.getUint8(offset+6)&0x7f)<<7)|(dv.getUint8(offset+7)&0x7f)
      : (dv.getUint8(offset+4)<<24)|(dv.getUint8(offset+5)<<16)|(dv.getUint8(offset+6)<<8)|dv.getUint8(offset+7);
    if (fsize <= 0 || offset + 10 + fsize > end) break;
    const fs = offset + 10, fe = fs + fsize;
    if (['TIT2','TPE1','TALB','TLEN'].includes(fid)) {
      const enc = dv.getUint8(fs);
      const bytes = new Uint8Array(buf, fs + 1, fsize - 1);
      const str = (enc === 1 || enc === 2) ? new TextDecoder('utf-16').decode(bytes)
                : new TextDecoder(enc === 3 ? 'utf-8' : 'latin1').decode(bytes);
      const val = str.replace(/\0/g, '').trim();
      if (fid === 'TIT2') r.title = val;
      else if (fid === 'TPE1') r.artist = val;
      else if (fid === 'TALB') r.album = val;
      else if (fid === 'TLEN') r.durationMs = parseInt(val, 10) || null;
    }
    if (fid === 'APIC' && !r.coverBlob) {
      let p = fs;
      const enc = dv.getUint8(p++);
      let mime = '';
      while (p < fe && dv.getUint8(p) !== 0) mime += String.fromCharCode(dv.getUint8(p++));
      p++; p++; // null terminator + picture type byte
      if (enc === 1 || enc === 2) { while (p + 1 < fe && !(dv.getUint8(p) === 0 && dv.getUint8(p+1) === 0)) p++; p += 2; }
      else { while (p < fe && dv.getUint8(p) !== 0) p++; p++; }
      if (p < fe) r.coverBlob = new Blob([new Uint8Array(buf, p, fe - p)], { type: mime || 'image/jpeg' });
    }
    offset = fe;
  }
  return r;
}

function _readAtom(dv, off) {
  if (off + 8 > dv.byteLength) return null;
  let size = dv.getUint32(off);
  const type = String.fromCharCode(dv.getUint8(off+4), dv.getUint8(off+5), dv.getUint8(off+6), dv.getUint8(off+7));
  if (size === 1 && off + 16 <= dv.byteLength) { const hi = dv.getUint32(off+8), lo = dv.getUint32(off+12); size = hi * 0x100000000 + lo; }
  if (size === 0) size = dv.byteLength - off;
  return size >= 8 ? { type, off, size, dOff: off + 8 } : null;
}
function _findAtom(dv, start, end, t) {
  let o = start;
  while (o + 8 <= end) { const a = _readAtom(dv, o); if (!a) break; if (a.type === t) return a; o += a.size; }
  return null;
}

async function parseMP4Meta(buf) {
  const dv = new DataView(buf);
  const r = { title: null, artist: null, album: null, durationMs: null, coverBlob: null };
  const moov = _findAtom(dv, 0, dv.byteLength, 'moov'); if (!moov) return r;
  const moovEnd = moov.off + moov.size;
  // Duration from mvhd
  const mvhd = _findAtom(dv, moov.dOff, moovEnd, 'mvhd');
  if (mvhd) {
    const ver = dv.getUint8(mvhd.dOff);
    const ts = ver === 1 ? dv.getUint32(mvhd.dOff + 20) : dv.getUint32(mvhd.dOff + 12);
    const dur = ver === 1 ? dv.getUint32(mvhd.dOff + 28) * 0x100000000 + dv.getUint32(mvhd.dOff + 32) : dv.getUint32(mvhd.dOff + 16);
    if (ts > 0) r.durationMs = Math.round(dur / ts * 1000);
  }
  // iTunes ilst
  const udta = _findAtom(dv, moov.dOff, moovEnd, 'udta'); if (!udta) return r;
  const meta = _findAtom(dv, udta.dOff, udta.off + udta.size, 'meta'); if (!meta) return r;
  const ilst = _findAtom(dv, meta.dOff + 4, meta.off + meta.size, 'ilst'); if (!ilst) return r;
  let o = ilst.dOff;
  const ilstEnd = ilst.off + ilst.size;
  while (o + 8 <= ilstEnd) {
    const item = _readAtom(dv, o); if (!item) break;
    const data = _findAtom(dv, item.dOff, item.off + item.size, 'data');
    if (data && data.dOff + 8 <= data.off + data.size) {
      const flags = dv.getUint32(data.dOff), dStart = data.dOff + 8, dLen = data.off + data.size - dStart;
      if (dLen > 0 && flags === 1 && ['©nam','©ART','©alb'].includes(item.type)) {
        const s = new TextDecoder('utf-8').decode(new Uint8Array(buf, dStart, dLen)).trim();
        if (item.type === '©nam') r.title = s;
        else if (item.type === '©ART') r.artist = s;
        else if (item.type === '©alb') r.album = s;
      } else if (dLen > 0 && (flags === 13 || flags === 14) && !r.coverBlob) {
        r.coverBlob = new Blob([new Uint8Array(buf, dStart, dLen)], { type: flags === 14 ? 'image/png' : 'image/jpeg' });
      }
    }
    o += item.size;
  }
  return r;
}

async function parseFLACMeta(buf) {
  const dv = new DataView(buf);
  const r = { title: null, artist: null, album: null, durationMs: null, coverBlob: null };
  if (dv.byteLength < 4 || String.fromCharCode(dv.getUint8(0), dv.getUint8(1), dv.getUint8(2), dv.getUint8(3)) !== 'fLaC') return r;
  let off = 4;
  while (off + 4 <= dv.byteLength) {
    const b0 = dv.getUint8(off), isLast = (b0 & 0x80) !== 0, blockType = b0 & 0x7f;
    const bLen = (dv.getUint8(off+1) << 16) | (dv.getUint8(off+2) << 8) | dv.getUint8(off+3);
    const bs = off + 4, be = bs + bLen; if (be > dv.byteLength) break;
    if (blockType === 0 && bLen >= 18) { // STREAMINFO — get sample rate + total samples for duration
      const sr = ((dv.getUint8(bs+10) << 12) | (dv.getUint8(bs+11) << 4) | (dv.getUint8(bs+12) >> 4)) & 0xFFFFF;
      const tsHi = dv.getUint8(bs+13) & 0x0F;
      const ts = tsHi * 0x100000000 + ((dv.getUint8(bs+14)<<24)|(dv.getUint8(bs+15)<<16)|(dv.getUint8(bs+16)<<8)|dv.getUint8(bs+17));
      if (sr > 0) r.durationMs = Math.round(ts / sr * 1000);
    } else if (blockType === 4) { // VORBIS_COMMENT
      let p = bs;
      const vLen = dv.getUint8(p)|(dv.getUint8(p+1)<<8)|(dv.getUint8(p+2)<<16)|(dv.getUint8(p+3)<<24); p += 4 + vLen;
      if (p + 4 <= be) {
        const count = dv.getUint8(p)|(dv.getUint8(p+1)<<8)|(dv.getUint8(p+2)<<16)|(dv.getUint8(p+3)<<24); p += 4;
        for (let i = 0; i < count && p + 4 <= be; i++) {
          const cLen = dv.getUint8(p)|(dv.getUint8(p+1)<<8)|(dv.getUint8(p+2)<<16)|(dv.getUint8(p+3)<<24); p += 4;
          if (p + cLen > be) break;
          const c = new TextDecoder('utf-8').decode(new Uint8Array(buf, p, cLen)); p += cLen;
          const eq = c.indexOf('='); if (eq < 1) continue;
          const k = c.slice(0, eq).toUpperCase(), v = c.slice(eq + 1);
          if (k === 'TITLE') r.title = v; else if (k === 'ARTIST') r.artist = v; else if (k === 'ALBUM') r.album = v;
        }
      }
    } else if (blockType === 6 && !r.coverBlob) { // PICTURE
      let p = bs + 4; // skip picture type
      const mLen = (dv.getUint8(p)<<24)|(dv.getUint8(p+1)<<16)|(dv.getUint8(p+2)<<8)|dv.getUint8(p+3); p += 4;
      const mime = new TextDecoder('ascii').decode(new Uint8Array(buf, p, mLen)); p += mLen;
      const dscLen = (dv.getUint8(p)<<24)|(dv.getUint8(p+1)<<16)|(dv.getUint8(p+2)<<8)|dv.getUint8(p+3); p += 4 + dscLen + 16;
      const imgLen = (dv.getUint8(p)<<24)|(dv.getUint8(p+1)<<16)|(dv.getUint8(p+2)<<8)|dv.getUint8(p+3); p += 4;
      if (p + imgLen <= be) r.coverBlob = new Blob([new Uint8Array(buf, p, imgLen)], { type: mime || 'image/jpeg' });
    }
    off = be; if (isLast) break;
  }
  return r;
}

async function fetchTrackMeta(t) {
  if (S.metaCache[t.id]) return S.metaCache[t.id];

  // ── Fast path: load art from OPFS (no S3 request) ──
  if (t._artKey) {
    const artFile = await loadArtFromOPFS(t._artKey);
    if (artFile) {
      t.coverUrl = createTrackedObjectUrl(artFile);
      S.metaCache[t.id] = { fromCache: true };
      return S.metaCache[t.id];
    }
    // Art file gone from OPFS (storage evicted?) — clear both flags so path 3 re-fetches
    t._artKey = null;
    t._metaCached = false;
  }

  // ── Fast path: text metadata cached AND confirmed no embedded art in file ──
  if (t._metaCached) { S.metaCache[t.id] = { fromCache: true }; return S.metaCache[t.id]; }

  // ── First-time: partial S3 fetch → parse → persist ──
  try {
    const buf = await fetchPartialAudio(t.key); if (!buf) return null;
    const ext = t.name.toLowerCase();
    let meta;
    if (ext.endsWith('.mp3'))                              meta = await parseID3v2(buf);
    else if (ext.endsWith('.m4a') || ext.endsWith('.aac')) meta = await parseMP4Meta(buf);
    else if (ext.endsWith('.flac'))                        meta = await parseFLACMeta(buf);
    else meta = { title: null, artist: null, album: null, durationMs: null, coverBlob: null };

    // Save cover art to OPFS
    let artKey = null;
    const hadArt = !!meta.coverBlob; // remember before we delete it
    if (meta.coverBlob) {
      artKey = await saveArtToOPFS(t.id, meta.coverBlob);
      meta.coverUrl = createTrackedObjectUrl(meta.coverBlob);
      delete meta.coverBlob;
      if (artKey) t._artKey = artKey;
    }

    // Apply parsed fields to the track object
    if (meta.title)   t.title    = meta.title;
    if (meta.artist)  t.artist   = meta.artist;
    if (meta.album)   t.album    = meta.album;
    if (meta.durationMs && !t.duration) t.duration = meta.durationMs / 1000;
    if (meta.coverUrl) t.coverUrl = meta.coverUrl;

    // Persist text metadata to localStorage for future sessions.
    // noArt:true means the file genuinely has no embedded artwork (vs. a failed OPFS save).
    // On next launch, _metaCached is only set when artKey is cached OR noArt is confirmed —
    // so a track with hadArt=true but artKey=null (failed save) will retry path 3 next time.
    setLSMeta(t.id, {
      title: t.title, artist: t.artist || null, album: t.album || null,
      duration: t.duration || null, artKey,
      noArt: !hadArt,
    });

    S.metaCache[t.id] = meta;
    return meta;
  } catch (e) { console.warn('meta', t.key, e.message); S.metaCache[t.id] = {}; return null; }
}

// Fetch metadata for all tracks concurrently (max 3 in-flight); update tiles as each arrives.
function fetchMetaAll() {
  return new Promise((resolve) => {
    const queue = S.tracks.slice();
    let inFlight = 0, done = 0;
    const total = queue.length;
    const MAX = 3;
    if (!total) { resolve(); return; }
    function pump() {
      while (inFlight < MAX && queue.length > 0) {
        const t = queue.shift(); inFlight++;
        fetchTrackMeta(t).then(() => {
          inFlight--; done++; updateTileDOM(t.id);
          if (done >= total) resolve(); else pump();
        });
      }
    }
    pump();
  });
}

// Manual "redownload all cover art" — wipe every cache layer and re-fetch from cloud.
// Clears OPFS art dir, localStorage meta, in-memory metaCache, and per-track art state,
// then runs a fresh fetchMetaAll so every cover comes straight from S3.
async function refreshAllArt() {
  if (S._refreshingArt) return;
  if (!navigator.onLine) { toast('No network — connect to refresh art'); return; }
  if (!S.tracks.length) return;
  S._refreshingArt = true;
  const btn = $('refresh-art-btn');
  btn.classList.add('spinning');
  toast('Refreshing cover art…');
  try {
    // 1. wipe OPFS art directory
    try {
      const root = await navigator.storage.getDirectory();
      await root.removeEntry(ART_DIR, { recursive: true });
    } catch { /* dir may not exist */ }
    // 2. wipe localStorage metadata cache
    try { localStorage.removeItem('snoozz_meta'); } catch {}
    // 3. reset in-memory + per-track caches so all 3 fast paths miss
    S.metaCache = {};
    for (const t of S.tracks) {
      t._artKey = null;
      t._metaCached = false;
      if (t.coverUrl) { try { URL.revokeObjectURL(t.coverUrl); } catch {} S.objectUrls.delete(t.coverUrl); t.coverUrl = null; }
    }
    renderGrid();              // show color blocks while we re-fetch
    await fetchMetaAll();      // pulls fresh metadata + art from S3
    toast('Cover art refreshed');
  } catch (e) {
    console.warn('refreshArt', e.message);
    toast('Refresh failed: ' + e.message);
  } finally {
    btn.classList.remove('spinning');
    S._refreshingArt = false;
  }
}

// ── Tile rendering helpers ──
function buildTileHTML(t) {
  const sel = S.selectMode && S.mix.includes(t.id);
  const selIdx = sel ? S.mix.indexOf(t.id) + 1 : 0;
  const playing = t.id === S.playingId && S.isPlaying;
  const dim = S.selectMode && !sel;
  const disabled = !isPlayable(t);
  const kind = badgeKind(t);
  const glyph = kind === 'local' ? '&#8595;' : kind === 'offline' ? '&#9888;' : '&#9729;';
  const corner = sel ? `<span class="tile-num">${selIdx}</span>` : `<span class="tile-badge ${kind}">${glyph}</span>`;
  const wave = playing ? '<span class="tile-wave"><span></span><span></span><span></span><span></span><span></span></span>' : '';
  const img = t.coverUrl ? `<img class="tile-img" src="${t.coverUrl}" alt="">` : '';
  const parts = [];
  if (t.artist) parts.push(escHtml(t.artist));
  if (t.album && t.album !== t.artist) parts.push(escHtml(t.album));
  if (t.duration) parts.push(formatTime(t.duration));
  const sub = parts.length ? `<span class="tile-sub">${parts.join(' · ')}</span>` : '';
  return `<div class="tile${sel?' selected':''}${playing?' playing':''}${dim?' dim':''}${disabled?' disabled':''}" data-id="${escHtml(t.id)}" style="--hue:${t.hue}">
    <div class="block">${img}<div class="tile-overlay"></div>${wave}${corner}<div class="tile-meta"><span class="tile-title">${escHtml(t.title)}</span>${sub}</div></div>
  </div>`;
}

function updateTileDOM(id) {
  const t = S.byId[id]; if (!t) return;
  const el = document.querySelector(`.tile[data-id="${CSS.escape(id)}"]`); if (!el) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = buildTileHTML(t);
  el.replaceWith(tmp.firstElementChild);
}

function renderGrid() {
  const grid = $('grid');
  if (!S.tracks.length) {
    grid.innerHTML = '';
    const note = $('empty-note');
    note.style.display = 'block';
    note.textContent = 'No sounds found in this bucket.\nUpload mp3 / aac / m4a / flac files to get started.';
    return;
  }
  $('empty-note').style.display = 'none';
  grid.innerHTML = S.tracks.map(buildTileHTML).join('');
}

function showMini() { $('mini').classList.add('active'); updateMini(); }
function currentTrack() { return S.queue[S.queueIdx] || null; }

function modeLabel() {
  if (S.queue.length > 1) return `${S.timer.minutes ? S.timer.minutes + '-min ' : ''}mix · ${S.queueIdx + 1} of ${S.queue.length}`;
  return 'single track';
}
function sourceWord(t) { return t && t.cached ? 'Local' : 'Stream'; }

function updateMini() {
  const t = currentTrack();
  if (!t) { $('mini').classList.remove('active'); return; }
  $('mini-art').style.setProperty('--mini-hue', t.hue);
  const img = $('mini-art-img');
  if (t.coverUrl) { img.src = t.coverUrl; img.style.display = 'block'; }
  else { img.style.display = 'none'; img.src = ''; }
  $('mini-title').textContent = t.title;
  const parts = [];
  if (t.artist) parts.push(t.artist);
  if (!parts.length) parts.push(sourceWord(t));
  parts.push(S.queue.length > 1 ? (S.timer.minutes ? `${S.timer.minutes}-min mix` : 'mix') : 'single track');
  $('mini-sub').textContent = parts.join(' · ');
}

function updatePlayIcons() {
  const icon = S.isPlaying ? '&#10074;&#10074;' : '&#9654;';
  $('mini-play').innerHTML = icon;
  $('np-play').innerHTML = icon;
}

function updateTimerUI(rem) {
  rem = rem == null ? (S.timer.endTime ? S.timer.endTime - Date.now() : 0) : rem;
  if (!S.timer.isRunning) {
    $('mini-timer').textContent = '';
    $('np-ring').style.display = 'none';
    return;
  }
  const secs = Math.max(0, Math.ceil(rem / 1000));
  const txt = formatTime(secs);
  $('mini-timer').textContent = txt;
  // now-playing ring + source line
  $('np-ring').style.display = 'block';
  const total = S.timer.minutes * 60000;
  const frac = Math.max(0, Math.min(1, rem / total));
  const circ = 2 * Math.PI * 48; // 301.6
  $('np-arc').setAttribute('stroke-dasharray', circ.toFixed(1));
  $('np-arc').setAttribute('stroke-dashoffset', (circ * (1 - frac)).toFixed(1));
  const t = currentTrack();
  if (t && S.expanded) {
    const g = t.cached ? '&#8595;' : (S.connectivity === 'offline' ? '&#9888;' : '&#9729;');
    $('np-source').innerHTML = `${sourceWord(t)} · ${g} &nbsp; fades out in ${txt}`;
  }
}

function renderNowPlaying() {
  const t = currentTrack();
  if (!t) return;
  $('np-context').textContent = modeLabel();
  $('np-cover').style.setProperty('--np-hue', t.hue);
  // Cover art
  const npImg = $('np-cover-img'), npOvl = $('np-cover-overlay');
  if (t.coverUrl) { npImg.src = t.coverUrl; npImg.style.display = 'block'; npOvl.style.display = 'block'; }
  else { npImg.style.display = 'none'; npImg.src = ''; npOvl.style.display = 'none'; }
  $('np-cover-title').textContent = t.coverUrl ? '' : t.title;
  // Title + artist/album
  $('np-title').textContent = t.title;
  const g = t.cached ? '&#8595;' : (S.connectivity === 'offline' ? '&#9888;' : '&#9729;');
  const meta = [t.artist, t.album].filter(Boolean).join(' · ');
  if (S.timer.isRunning) updateTimerUI();
  else {
    const srcLine = `${sourceWord(t)} · ${g}`;
    $('np-source').innerHTML = meta ? `${escHtml(meta)}<br><span style="opacity:.6">${srcLine}</span>` : srcLine;
  }
  $('np-dl').classList.toggle('accent', t.cached);
  $('loop-btn').classList.toggle('on', S.loopMode);
  updateScrubber();
  updateVolUI();
  updatePlayIcons();
}

function updateScrubber() {
  if (!S.expanded) return;
  const cur = audio.currentTime || 0, dur = audio.duration || 0;
  const pct = dur ? (cur / dur) * 100 : 0;
  $('scrub-fill').style.width = pct + '%';
  $('scrub-thumb').style.left = pct + '%';
  $('time-cur').textContent = formatTime(cur);
  $('time-tot').textContent = formatTime(dur);
}
function updateVolUI() {
  const pct = Math.round(S.volume * 100);
  $('vol-fill').style.width = pct + '%';
  $('vol-thumb').style.left = pct + '%';
}
function updateAllUI() {
  renderGrid();
  updateMini();
  updatePlayIcons();
  updateTimerUI();
  if (S.expanded) renderNowPlaying();
}

function expandNow() {
  if (!S.queue.length) return;
  S.expanded = true;
  renderNowPlaying();
  $('now').classList.add('active');
}
function collapseNow() { S.expanded = false; $('now').classList.remove('active'); }

// ══════════════════════════════════════════════════════════════
//  Media Session
// ══════════════════════════════════════════════════════════════
function updateMediaSession() {
  if (!('mediaSession' in navigator)) return;
  const t = currentTrack(); if (!t) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title, artist: 'Snoozz',
      album: S.queue.length > 1 ? 'Sleep mix' : 'Sleep music',
    });
    navigator.mediaSession.setActionHandler('play', () => togglePlay());
    navigator.mediaSession.setActionHandler('pause', () => togglePlay());
    navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
    navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack());
  } catch {}
}

// ══════════════════════════════════════════════════════════════
//  Persistence
// ══════════════════════════════════════════════════════════════
function savePersist() {
  try {
    localStorage.setItem('snoozz_state', JSON.stringify({
      mix: S.mix, timerPrefs: S.timerPrefs, volume: S.volume,
      lastTrackId: S.playingId, lastQueue: S.queue.map(t => t.id),
    }));
  } catch {}
}
function loadPersist() {
  try {
    const raw = localStorage.getItem('snoozz_state');
    if (!raw) return;
    const d = JSON.parse(raw);
    if (typeof d.volume === 'number') { S.volume = d.volume; S.savedVolume = d.volume; audio.volume = d.volume; }
    if (d.timerPrefs) S.timerPrefs = { ...S.timerPrefs, ...d.timerPrefs };
    if (Array.isArray(d.mix)) S._restoredMix = d.mix;
  } catch {}
}

// ══════════════════════════════════════════════════════════════
//  Login / session
// ══════════════════════════════════════════════════════════════
async function handleLogin() {
  const endpoint = $('inp-endpoint').value.trim();
  const bucket = $('inp-bucket').value.trim();
  const region = $('inp-region').value.trim() || 'us-east-1';
  const accessKey = $('inp-access-key').value.trim();
  const secretKey = $('inp-secret-key').value.trim();
  const masterPw = $('inp-master-pw').value;
  const err = $('login-err'); err.textContent = '';
  if (!endpoint || !bucket || !accessKey || !secretKey || !masterPw) { err.textContent = 'All fields are required'; return; }
  try {
    S.s3 = new S3Client({ endpoint, bucket, region, accessKey, secretKey });
    showLoading('Connecting…');
    await S.s3.listObjects('', '/');
  } catch (e) {
    hideLoading();
    const m = e.message || '';
    err.textContent = m.includes('Failed to fetch') ? 'Network/CORS error — check endpoint & bucket CORS'
      : m.includes('403') ? 'Access denied (403) — check keys & permissions'
      : m.includes('404') ? 'Bucket not found (404) — check name & region'
      : m.includes('SignatureDoesNotMatch') ? 'Signature mismatch — check secret key'
      : 'Connection failed: ' + m.slice(0, 80);
    return;
  }
  try {
    const env = await Crypto.encrypt(masterPw, { endpoint, bucket, region, accessKey, secretKey });
    localStorage.setItem('snoozz_creds', JSON.stringify(env));
  } catch { hideLoading(); err.textContent = 'Encryption error'; return; }
  await bootApp();
}

async function handleUnlock() {
  const pw = $('inp-unlock-pw').value;
  const err = $('unlock-err'); err.textContent = '';
  if (!pw) { err.textContent = 'Password required'; return; }
  const stored = localStorage.getItem('snoozz_creds');
  if (!stored) { showFullLogin(); return; }
  try {
    const creds = await Crypto.decrypt(pw, JSON.parse(stored));
    S.s3 = new S3Client(creds);
    showLoading('Connecting…');
    await S.s3.listObjects('', '/');
    await bootApp();
  } catch { hideLoading(); err.textContent = 'Incorrect password or connection failed'; }
}

function showFullLogin() { $('unlock-form').style.display = 'none'; $('login-form').style.display = ''; localStorage.removeItem('snoozz_creds'); }
function showUnlockForm() { $('login-form').style.display = 'none'; $('unlock-form').style.display = ''; setTimeout(() => $('inp-unlock-pw').focus(), 100); }

async function bootApp() {
  loadPersist();
  $('login').classList.remove('active');
  $('home').classList.add('active');
  await crawlTracks();
  await detectCached();
  // restore mix selection (just remembers ids; user re-enters select to use)
  if (S._restoredMix) S.mix = S._restoredMix.filter(id => S.byId[id]);
  renderGrid();
  updateVolUI();
  hideLoading();
  if (S.tracks.length) {
    toast(`${S.tracks.length} sound${S.tracks.length !== 1 ? 's' : ''} ready`);
    fetchMetaAll(); // background — updates tiles as art/metadata arrives
  }
}

// ══════════════════════════════════════════════════════════════
//  Now-playing download toggle
// ══════════════════════════════════════════════════════════════
async function toggleDownload() {
  const t = currentTrack(); if (!t) return;
  if (t.cached) { await removeCached(t); toast('Removed offline copy'); }
  else { await downloadTrack(t); }
  if (S.expanded) renderNowPlaying();
  renderGrid();
}

// ══════════════════════════════════════════════════════════════
//  Slider drag helpers
// ══════════════════════════════════════════════════════════════
function bindSlider(trackEl, onSet, opts = {}) {
  function pct(e) {
    const r = trackEl.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    return Math.max(0, Math.min(1, x / r.width));
  }
  let dragging = false;
  function down(e) { dragging = true; if (opts.onStart) opts.onStart(); onSet(pct(e)); e.preventDefault(); }
  function move(e) { if (dragging) onSet(pct(e)); }
  function up(e) { if (dragging) { dragging = false; if (opts.onEnd) opts.onEnd(pct(e)); } }
  trackEl.addEventListener('mousedown', down); trackEl.addEventListener('touchstart', down, { passive: false });
  window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, { passive: false });
  window.addEventListener('mouseup', up); window.addEventListener('touchend', up);
}

// ══════════════════════════════════════════════════════════════
//  Event binding
// ══════════════════════════════════════════════════════════════
const actions = {
  'login': handleLogin,
  'unlock': handleUnlock,
  'refresh-art': refreshAllArt,
  'full-login': showFullLogin,
  'open-timer': openSheet,
  'close-sheet': closeSheet,
  'start-timer': startTimerFromSheet,
  'cancel-select': exitSelectMode,
  'clear-mix': clearMix,
  'play-mix': playMix,
  'expand': expandNow,
  'collapse': collapseNow,
  'toggle-play': togglePlay,
  'prev': prevTrack,
  'next': nextTrack,
  'extend': extendTimer,
  'toggle-loop': () => { S.loopMode = !S.loopMode; $('loop-btn').classList.toggle('on', S.loopMode); },
  'toggle-download': toggleDownload,
};

function bindEvents() {
  document.body.addEventListener('click', (e) => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const act = el.dataset.action;
    // mini-bar: play button shouldn't also expand
    if (act === 'toggle-play' && el.dataset.stop) { e.stopPropagation(); }
    if (actions[act]) { actions[act](); }
  });

  // Enter key on login fields
  ['inp-master-pw', 'inp-secret-key'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); }));
  $('inp-unlock-pw').addEventListener('keydown', e => { if (e.key === 'Enter') handleUnlock(); });

  // Sheet chips
  $('chips').addEventListener('click', (e) => {
    const c = e.target.closest('.chip'); if (!c) return;
    if (c.dataset.custom) {
      const v = prompt('Custom timer (minutes):', String(S.timerPrefs.minutes));
      const n = parseInt(v, 10);
      if (n && n > 0 && n <= 600) S.timerPrefs.minutes = n;
    } else {
      S.timerPrefs.minutes = parseInt(c.dataset.preset, 10);
    }
    renderChips(); updateSheetCta(); savePersist();
  });

  // Sheet toggles
  document.querySelectorAll('[data-toggle]').forEach(sw => {
    sw.addEventListener('click', () => {
      const key = sw.dataset.toggle;
      S.timerPrefs[key] = !S.timerPrefs[key];
      sw.classList.toggle('on', S.timerPrefs[key]);
      savePersist();
    });
  });

  // Grid: tap vs long-press
  const grid = $('grid');
  let pressId = null, pressTimer = null, moved = false, startX = 0, startY = 0;
  grid.addEventListener('pointerdown', (e) => {
    const tile = e.target.closest('.tile'); if (!tile) return;
    pressId = tile.dataset.id; moved = false;
    startX = e.clientX; startY = e.clientY;
    if (S.selectMode) return; // taps handled on pointerup
    pressTimer = setTimeout(() => { pressTimer = null; enterSelectMode(pressId); }, 450);
  });
  grid.addEventListener('pointermove', (e) => {
    if (pressId == null) return;
    if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) {
      moved = true;
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    }
  });
  function endPress() {
    if (pressId == null) return;
    const id = pressId; pressId = null;
    if (S.selectMode) { if (!moved) toggleSelect(id); return; }
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; if (!moved) { const t = S.byId[id]; if (t) playSingle(t); } }
  }
  grid.addEventListener('pointerup', endPress);
  grid.addEventListener('pointercancel', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } pressId = null; });

  // Scrubber drag
  bindSlider($('scrub-track'), (p) => {
    const dur = audio.duration || 0;
    $('scrub-fill').style.width = (p * 100) + '%';
    $('scrub-thumb').style.left = (p * 100) + '%';
    $('time-cur').textContent = formatTime(p * dur);
  }, { onStart: () => { S.scrubDragging = true; }, onEnd: (p) => { S.scrubDragging = false; if (audio.duration) audio.currentTime = p * audio.duration; } });

  // Volume drag.
  // Desktop: audio.volume controls output directly (hi-res path).
  // iOS: audio.volume is ignored during normal hi-res playback — the slider moves but
  // can't change output (use the phone's volume buttons); it only takes effect once the
  // Web Audio graph is live (during/after a fade). We drive both so it works everywhere it can.
  bindSlider($('vol-track'), (p) => {
    S.volume = p; S.savedVolume = p;
    if (!S._fadeStarted) {
      audio.volume = p;
      if (gainNode && audioCtx) { try { gainNode.gain.setValueAtTime(p, audioCtx.currentTime); } catch {} }
    }
    updateVolUI();
  }, { onEnd: () => savePersist() });

  // Swipe down to collapse now-playing
  let npY = 0;
  $('now').addEventListener('touchstart', (e) => { npY = e.touches[0].clientY; }, { passive: true });
  $('now').addEventListener('touchend', (e) => {
    if (e.changedTouches[0].clientY - npY > 90) collapseNow();
  }, { passive: true });

  // Sleep-timer sheet: guaranteed minimise paths for iOS.
  // (Tapping the scrim already closes via delegation; these are belt-and-braces.)
  // 1) swipe down anywhere on the sheet, 2) tap the grab handle.
  let shY = null;
  const sheet = $('sheet');
  sheet.addEventListener('touchstart', (e) => { shY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', (e) => {
    if (shY != null && e.changedTouches[0].clientY - shY > 60) closeSheet();
    shY = null;
  }, { passive: true });
  $('sheet-grab').addEventListener('click', closeSheet);
  // Direct scrim close — iOS sometimes drops body-delegated clicks on bare divs.
  $('scrim').addEventListener('click', closeSheet);

  // Connectivity
  window.addEventListener('online', () => { S.connectivity = 'online'; toast('Back online'); renderGrid(); });
  window.addEventListener('offline', () => { S.connectivity = 'offline'; toast('Offline — cached sounds still play'); renderGrid(); });

  // Persist on hide
  document.addEventListener('visibilitychange', () => { if (document.hidden) savePersist(); });
  window.addEventListener('pagehide', savePersist);
}

// ══════════════════════════════════════════════════════════════
//  PWA: service worker (external sw.js + manifest.json)
// ══════════════════════════════════════════════════════════════
function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ══════════════════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════════════════
function init() {
  registerServiceWorker();
  bindEvents();
  $('login').classList.add('active');
  if (localStorage.getItem('snoozz_creds')) showUnlockForm();
  else showFullLogin();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>

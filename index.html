<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Snoozz">
<meta name="theme-color" content="#0d0e12">
<link rel="manifest" href="./manifest.json">
<title>Snoozz — Sleep Music</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20512%20512%22%3E%3Crect%20width%3D%22512%22%20height%3D%22512%22%20rx%3D%22112%22%20fill%3D%22%230d0e12%22%2F%3E%3Ccircle%20cx%3D%22232%22%20cy%3D%22256%22%20r%3D%22150%22%20fill%3D%22%237da6d9%22%2F%3E%3Ccircle%20cx%3D%22300%22%20cy%3D%22216%22%20r%3D%22140%22%20fill%3D%22%230d0e12%22%2F%3E%3C%2Fsvg%3E">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
/* Re-enable text entry/selection only where it's needed (login fields).
   App-wide selection is OFF so iOS doesn't hijack taps as selection gestures —
   that was eating clicks on the timer chips, scrim, and Start button on iOS. */
input, textarea { -webkit-user-select: text; user-select: text; }

:root {
  --bg: #0d0e12;
  --bg-raised: #101218;
  --ink: rgba(228,233,243,0.82);
  --ink-dim: rgba(228,233,243,0.42);
  --ink-faint: rgba(228,233,243,0.18);
  --fill: rgba(228,233,243,0.05);
  --fill2: rgba(228,233,243,0.085);
  --accent: oklch(0.74 0.085 248);
  --accent-dim: oklch(0.74 0.085 248 / 0.22);
  --accent-faint: oklch(0.74 0.085 248 / 0.12);
  --on-accent: #08111c;
  --warn: oklch(0.74 0.09 70);
  --r-tile: 14px;
  --r-bar: 16px;
  --r-sheet: 22px;
  --r-btn: 14px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --mono: "Spline Sans Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg); color: var(--ink);
  font-family: var(--font); font-size: 15px; line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  overscroll-behavior: none;
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
button:focus:not(:focus-visible) { outline: none; }
button { font-family: inherit; color: inherit; cursor: pointer; border: none; background: none; -webkit-appearance: none; appearance: none; touch-action: manipulation; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

::-webkit-scrollbar { width: 0; height: 0; }

#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ── Login ── */
#login { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 28px; animation: fadeIn .5s ease; }
#login.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.moon { position: relative; width: 30px; height: 30px; flex: 0 0 auto; }
.moon::before { content: ""; position: absolute; inset: 0; border-radius: 50%; background: var(--accent); }
.moon::after { content: ""; position: absolute; right: -6px; top: -3px; width: 26px; height: 26px; border-radius: 50%; background: var(--bg); }
.wordmark { font-size: 34px; font-weight: 600; letter-spacing: 0.01em; }
.login-sub { font: 11px var(--mono); color: var(--ink-dim); letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 34px; }
.form { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 11px; }
.form input {
  background: var(--bg-raised); border: 1.5px solid var(--ink-faint); color: var(--ink);
  padding: 13px 15px; border-radius: var(--r-btn); font-family: var(--mono); font-size: 14px; outline: none;
  transition: border-color .2s; width: 100%;
}
.form input:focus { border-color: var(--accent); }
.form input::placeholder { color: var(--ink-dim); }
.row { display: flex; gap: 10px; }
.row > * { flex: 1; min-width: 0; }
.form-err { color: var(--warn); font: 12px var(--mono); text-align: center; min-height: 1.2em; }
.btn-primary {
  background: var(--accent); color: var(--on-accent); padding: 13px 22px; border-radius: var(--r-btn);
  font-weight: 600; font-size: 15px; transition: filter .15s, transform .1s;
}
.btn-primary:active { transform: translateY(1px); }
.btn-text { color: var(--ink-dim); font: 13px var(--mono); padding: 8px; text-align: center; }

/* ── Home ── */
#home { display: none; flex-direction: column; height: 100%; min-height: 0; }
#home.active { display: flex; }

/* z-index + solid bg + own layer keep the bar painted during iOS momentum scroll
   (it sits outside the scroller so it's already locked by layout — this stops the flicker). */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px 12px; flex: 0 0 auto; position: relative; z-index: 3; background: var(--bg); transform: translateZ(0); }
.topbar-brand { display: flex; align-items: center; gap: 9px; }
.topbar-brand .moon { width: 18px; height: 18px; }
.topbar-brand .moon::after { right: -3px; top: -2px; width: 15px; height: 15px; }
.topbar-brand .wordmark { font-size: 25px; font-weight: 700; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--ink-dim);
  display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--ink);
  transition: border-color .15s, background .15s;
}
.icon-btn:active { background: var(--fill2); }
.icon-btn.accent { border-color: var(--accent); color: var(--accent); }
.topbar-actions { display: flex; align-items: center; gap: 9px; }
#refresh-art-btn { font-size: 19px; }
#refresh-art-btn.spinning { color: var(--accent); border-color: var(--accent); animation: spin 0.9s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

#topbar-select { display: none; align-items: center; justify-content: space-between; padding: 8px 18px 12px; flex: 0 0 auto; position: relative; z-index: 3; background: var(--bg); transform: translateZ(0); }
#topbar-select.active { display: flex; }
#topbar-select .center { font-size: 17px; font-weight: 600; }
#topbar-select .side { font: 15px var(--font); color: var(--ink-dim); padding: 8px; min-width: 56px; }
#topbar-select .side.right { text-align: right; color: var(--accent); }
#topbar-select .side.left { text-align: left; }

#grid-scroll { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 8px; min-height: 0; }
#grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 11px; }

.tile { position: relative; cursor: pointer; transition: opacity .15s; user-select: none; -webkit-user-select: none; }
.tile.dim { opacity: 0.4; }
.tile.disabled { opacity: 0.45; }
.block {
  position: relative; width: 100%; aspect-ratio: 1 / 1; border-radius: var(--r-tile);
  background: oklch(0.42 0.07 var(--hue));
  overflow: hidden; transition: box-shadow .2s, transform .12s;
}
.tile:active .block { transform: scale(0.97); }
.tile.selected .block { box-shadow: 0 0 0 2px var(--accent), 0 0 14px var(--accent-dim); }
.tile.playing .block { box-shadow: 0 0 0 1.5px var(--accent-dim); }
/* cover art image fills the block */
.tile-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; display: block; }
/* gradient overlay for text legibility over art or dark colour blocks */
.tile-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.82) 100%); z-index: 1; pointer-events: none; }
/* metadata block pinned to tile bottom */
.tile-meta { position: absolute; left: 0; right: 0; bottom: 0; padding: 0 8px 7px; z-index: 2; }
.tile-title { display: block; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.96); line-height: 1.2; text-shadow: 0 1px 4px rgba(0,0,0,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tile-sub { display: block; font: 9px var(--mono); color: rgba(255,255,255,0.58); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
.tile-badge {
  position: absolute; right: 6px; top: 6px; width: 19px; height: 19px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font: 11px var(--mono);
  background: rgba(13,14,18,0.6); border: 1.2px solid var(--ink-dim); color: var(--ink-dim);
  backdrop-filter: blur(4px); z-index: 3;
}
.tile-badge.local { color: var(--accent); border-color: var(--accent); }
.tile-badge.offline { color: var(--warn); border-color: var(--warn); }
.tile-num {
  position: absolute; right: 6px; top: 6px; width: 20px; height: 20px; border-radius: 50%;
  background: var(--accent); color: var(--on-accent); font-weight: 700; font-size: 12px;
  display: flex; align-items: center; justify-content: center; z-index: 3;
}
.tile-wave { position: absolute; left: 7px; top: 7px; display: inline-flex; align-items: flex-end; gap: 1.5px; height: 12px; z-index: 3; }
.tile-wave span { width: 2px; background: var(--accent); border-radius: 1px; animation: wave 0.9s ease-in-out infinite; }
.tile-wave span:nth-child(1){height:5px;animation-delay:0s}
.tile-wave span:nth-child(2){height:11px;animation-delay:.15s}
.tile-wave span:nth-child(3){height:4px;animation-delay:.3s}
.tile-wave span:nth-child(4){height:9px;animation-delay:.45s}
.tile-wave span:nth-child(5){height:7px;animation-delay:.6s}
@keyframes wave { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }

.empty-note { text-align: center; color: var(--ink-dim); font: 14px var(--mono); padding: 60px 20px; line-height: 1.7; }

/* ── Mix tray ── */
#mix-tray { display: none; margin: 0 12px 8px; padding: 13px 14px 14px; border-radius: 17px; border: 1.5px solid var(--accent); background: var(--bg-raised); flex: 0 0 auto; }
#mix-tray.active { display: block; animation: slideUpFade .25s ease; }
@keyframes slideUpFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.tray-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.tray-count { font-size: 16px; font-weight: 600; }
.tray-summary { font: 11px var(--mono); color: var(--ink-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 55%; }
.tray-actions { display: flex; gap: 10px; margin-top: 11px; }
.tray-actions button { flex: 1; padding: 11px 0; border-radius: 999px; font-size: 15px; font-weight: 600; }
.tray-actions .outline { border: 1.5px solid var(--ink-dim); color: var(--ink); }
.tray-actions .filled { background: var(--accent); color: var(--on-accent); }
.tray-actions button:disabled { opacity: 0.4; }

/* ── Mini bar ── */
#mini { display: none; margin: 0 12px 10px; padding: 9px 11px; border-radius: var(--r-bar); border: 1.5px solid var(--ink-faint); background: var(--bg-raised); align-items: center; gap: 11px; flex: 0 0 auto; cursor: pointer; }
#mini.active { display: flex; }
.mini-art { width: 40px; height: 40px; border-radius: 9px; flex: 0 0 auto; background: oklch(0.42 0.07 var(--mini-hue, 248)); overflow: hidden; position: relative; }
.mini-art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
.mini-info { flex: 1 1 auto; min-width: 0; }
.mini-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-sub { font: 10px var(--mono); color: var(--ink-dim); margin-top: 2px; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-timer { font: 13px var(--mono); color: var(--accent); flex: 0 0 auto; }
.mini-play { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--ink); display: flex; align-items: center; justify-content: center; font-size: 13px; flex: 0 0 auto; }

/* ── Now Playing ── */
#now { display: none; position: absolute; inset: 0; z-index: 40; background: var(--bg); flex-direction: column; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
#now.active { display: flex; animation: npUp .3s ease-out; }
@keyframes npUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.np-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px 4px; flex: 0 0 auto; }
.np-header .center { font: 14px var(--mono); color: var(--ink-dim); }
.np-iconbtn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--ink); }
.np-iconbtn.accent { color: var(--accent); }
.np-body { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; gap: 22px; padding: 0 28px; min-height: 0; }
.np-cover-wrap { position: relative; width: 280px; max-width: 78vw; aspect-ratio: 1/1; margin: 0 auto; }
.np-cover { position: absolute; inset: 14px; border-radius: var(--r-sheet); background: oklch(0.42 0.07 var(--np-hue, 248)); display: flex; align-items: flex-end; padding: 18px; overflow: hidden; }
.np-cover-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: var(--r-sheet); display: none; }
.np-cover-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.7) 100%); display: none; border-radius: var(--r-sheet); }
.np-cover-title { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.95); text-shadow: 0 1px 6px rgba(0,0,0,0.4); position: relative; z-index: 1; }
.np-ring { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
.np-ring circle { fill: none; }
.np-ring .track { stroke: var(--ink-faint); stroke-width: 1.2; }
.np-ring .arc { stroke: var(--accent); stroke-width: 1.6; stroke-linecap: round; transition: stroke-dashoffset .5s linear; }
.np-meta { text-align: center; }
.np-title { font-size: 27px; font-weight: 600; }
.np-source { font: 12px var(--mono); color: var(--ink-dim); margin-top: 5px; }
.np-scrub { display: flex; flex-direction: column; gap: 6px; }
.scrub-track { height: 4px; border-radius: 2px; background: var(--ink-faint); position: relative; cursor: pointer; }
.scrub-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 2px; width: 0; }
.scrub-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 13px; height: 13px; border-radius: 50%; background: var(--accent); left: 0; }
.scrub-times { display: flex; justify-content: space-between; font: 10px var(--mono); color: var(--ink-dim); }
.np-transport { display: flex; align-items: center; justify-content: center; gap: 26px; }
.np-transport button { font-size: 26px; color: var(--ink); display: flex; align-items: center; justify-content: center; }
.np-transport .small { font-size: 22px; color: var(--ink-dim); }
.np-transport .small.on { color: var(--accent); }
.np-play { width: 68px; height: 68px; border-radius: 50%; background: var(--accent); color: var(--on-accent); font-size: 24px; }
.np-vol { display: flex; align-items: center; gap: 12px; }
.np-vol .vicon { font-size: 14px; color: var(--ink-dim); flex: 0 0 auto; }
.np-vol-track { flex: 1; height: 4px; border-radius: 2px; background: var(--ink-faint); position: relative; cursor: pointer; }
.np-vol-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--ink); opacity: 0.7; border-radius: 2px; width: 55%; }
.np-vol-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: var(--ink); left: 55%; }

/* ── Sheet ── */
#scrim { display: none; position: absolute; inset: 0; z-index: 50; background: rgba(13,14,18,0.72); cursor: pointer; }
#scrim.active { display: block; }
#sheet { position: absolute; left: 0; right: 0; bottom: 0; z-index: 51; transform: translateY(100%); transition: transform .3s ease; background: var(--bg-raised); border-radius: var(--r-sheet) var(--r-sheet) 0 0; border-top: 1.5px solid var(--ink-faint); box-shadow: 0 -20px 50px rgba(0,0,0,0.5); padding: 14px 20px calc(26px + var(--safe-bottom)); touch-action: pan-y; }
#sheet.active { transform: translateY(0); }
.sheet-grab { width: 38px; height: 5px; border-radius: 3px; background: var(--ink-dim); margin: 0 auto 16px; cursor: pointer; box-sizing: content-box; padding: 10px 30px; background-clip: content-box; }
.sheet-title { font-size: 21px; font-weight: 600; margin-bottom: 3px; }
.sheet-sub { font: 11px var(--mono); color: var(--ink-dim); margin-bottom: 16px; }
.chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
.chip { padding: 9px 16px; border-radius: 999px; border: 1.5px solid var(--ink-dim); color: var(--ink); font-size: 15px; transition: all .15s; }
.chip.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); font-weight: 600; }
.toggles { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle-row span { font-size: 16px; }
.switch { width: 46px; height: 28px; border-radius: 999px; background: var(--fill2); border: 1.5px solid var(--ink-dim); position: relative; transition: background .2s, border-color .2s; flex: 0 0 auto; }
.switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; border-radius: 50%; background: var(--ink-dim); transition: transform .2s, background .2s; }
.switch.on { background: var(--accent); border-color: var(--accent); }
.switch.on::after { transform: translateX(18px); background: var(--on-accent); }
.sheet-cta { width: 100%; text-align: center; padding: 15px 0; border-radius: var(--r-btn); background: var(--accent); color: var(--on-accent); font-size: 17px; font-weight: 700; }

/* ── Loading / Toast ── */
#loading { display: none; position: absolute; inset: 0; z-index: 80; background: var(--bg); flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
#loading.active { display: flex; }
.spinner { width: 30px; height: 30px; border: 3px solid var(--fill2); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading .ltext { font: 12px var(--mono); color: var(--ink-dim); letter-spacing: 0.08em; }
#toasts { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(96px + var(--safe-bottom)); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
.toast { background: var(--bg-raised); border: 1.5px solid var(--accent-dim); color: var(--ink); padding: 11px 18px; border-radius: var(--r-btn); font-size: 13px; max-width: 80vw; text-align: center; animation: toastIn .25s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN -->
  <div id="login">
    <div class="brand"><span class="moon"></span><span class="wordmark">Snoozz</span></div>
    <div class="login-sub">Sleep Music</div>

    <form class="form" id="unlock-form" style="display:none" onsubmit="return false">
      <input id="inp-unlock-pw" type="password" placeholder="Master password" autocomplete="current-password">
      <div class="form-err" id="unlock-err"></div>
      <button class="btn-primary" data-action="unlock">Unlock</button>
      <button class="btn-text" data-action="full-login">Use different bucket</button>
    </form>

    <form class="form" id="login-form" onsubmit="return false">
      <input id="inp-endpoint" placeholder="Endpoint (e.g. s3.wasabisys.com)">
      <input id="inp-bucket" placeholder="Bucket name">
      <div class="row">
        <input id="inp-region" placeholder="Region (us-east-1)">
      </div>
      <input id="inp-access-key" placeholder="Access key" autocomplete="off">
      <input id="inp-secret-key" type="password" placeholder="Secret key" autocomplete="off">
      <input id="inp-master-pw" type="password" placeholder="Master password (encrypts keys on device)" autocomplete="new-password">
      <div class="form-err" id="login-err"></div>
      <button class="btn-primary" data-action="login">Connect</button>
    </form>
  </div>

  <!-- HOME -->
  <div id="home">
    <div class="topbar" id="topbar-normal">
      <div class="topbar-brand"><span class="moon"></span><span class="wordmark">Snoozz</span></div>
      <div class="topbar-actions">
        <button class="icon-btn" id="refresh-art-btn" data-action="refresh-art" title="Refresh cover art">&#8635;</button>
        <button class="icon-btn" data-action="open-timer" title="Sleep timer">&#9201;</button>
      </div>
    </div>
    <div id="topbar-select">
      <button class="side left" data-action="cancel-select">Cancel</button>
      <span class="center">Select tracks</span>
      <button class="side right" data-action="clear-mix">Clear</button>
    </div>

    <div id="grid-scroll">
      <div id="grid"></div>
      <div class="empty-note" id="empty-note" style="display:none"></div>
    </div>

    <div id="mix-tray">
      <div class="tray-head">
        <span class="tray-count" id="tray-count">0 in your mix</span>
        <span class="tray-summary" id="tray-summary"></span>
      </div>
      <div class="tray-actions">
        <button class="outline" data-action="open-timer">Set timer</button>

<script>
// ══════════════════════════════════════════════════════════════
//  Snoozz — Sleep Music Player (single-file PWA)
//  Reuses Tome's S3 client, crypto, OPFS cache, Media Session, SW.
// ══════════════════════════════════════════════════════════════
(function () {
'use strict';

// ── Config ──
const CFG = Object.freeze({
  AUDIO_EXTS:      ['.mp3', '.aac', '.m4a', '.flac'],
  URL_CACHE_TTL:   50 * 60 * 1000,
  URL_CACHE_MAX:   500,
  PBKDF2_ITER:     310_000,
  FADE_WINDOW_MS:  60_000,      // fade over last 60s
  FADE_STEP_MS:    200,
  MAX_RETRIES:     3,
  TOAST_MS:        3200,
  PRESETS:         [15, 30, 45, 60, 90],
  HUE_MIN:         15,
  HUE_SPAN:        306,         // 15..321
});

// ── State ──
const S = {
  s3: null,
  tracks: [], byId: {},
  selectMode: false,
  mix: [],                       // ordered track ids
  queue: [], queueIdx: 0,        // track objects currently playing
  loopMode: false,
  playingId: null, isPlaying: false,
  volume: 1, savedVolume: 1,
  timer: { minutes: null, endTime: null, fadeWindowMs: CFG.FADE_WINDOW_MS, isRunning: false },
  timerPrefs: { minutes: 30, fadeOut: true, shuffle: false, loop: true },
  tickId: null, fadeId: null,
  connectivity: navigator.onLine ? 'online' : 'offline',
  urlCache: {}, objectUrls: new Set(),
  metaCache: {},      // { [trackId]: parsed metadata object }
  positions: {},
  expanded: false,
  scrubDragging: false,
};

const $ = id => document.getElementById(id);
let audio;                 // current playback element; rebuilt after a Web Audio fade taints it
let audioRetry = 0;
// Web Audio is used ONLY for the sleep-timer fade — iOS ignores audio.volume, so a
// GainNode is the only way to ramp output there. Attaching a MediaElementSource taints
// the element (iOS then resamples it), which is fine for the end-of-session fade; we
// rebuild a pristine element next session to restore true hi-res direct playback.
let audioCtx = null, srcNode = null, gainNode = null, waTainted = false;

function attachAudioListeners(el) {
  el.addEventListener('ended', handleEnded);
  el.addEventListener('play', () => { S.isPlaying = true; updatePlayIcons(); if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing'; });
  el.addEventListener('pause', () => { if (!S.timer.isRunning || el.currentTime) updatePlayIcons(); if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused'; });
  el.addEventListener('timeupdate', () => { if (!S.scrubDragging) updateScrubber(); });
  el.addEventListener('playing', () => { audioRetry = 0; });
  el.addEventListener('error', async () => {
    const t = S.queue[S.queueIdx];
    if (!t || t.cached || audioRetry >= CFG.MAX_RETRIES) return;
    audioRetry++;
    delete S.urlCache[t.key];
    try {
      const url = await S.s3.getSignedUrl(t.key);
      el.src = url; el.load();
      if (S.isPlaying) el.play().catch(() => {});
    } catch {}
  });
}
function newAudioElement() {
  const el = new Audio();
  el.preload = 'auto';
  attachAudioListeners(el);
  return el;
}
audio = newAudioElement();

// If a prior sleep-fade routed playback through Web Audio (tainting the element and
// forcing iOS resampling), rebuild a fresh element so the next session plays hi-res direct.
function ensureFreshAudio() {
  if (!waTainted) return;
  try { audio.pause(); } catch {}
  try { srcNode && srcNode.disconnect(); } catch {}
  try { gainNode && gainNode.disconnect(); } catch {}
  try { audioCtx && audioCtx.close(); } catch {}
  audioCtx = srcNode = gainNode = null; waTainted = false;
  audio = newAudioElement();
  audio.volume = S.volume;
}

// ══════════════════════════════════════════════════════════════
//  Utilities
// ══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function formatTime(s) {
  if (!s || isNaN(s) || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}
function naturalSort(a, b) {
  return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' });
}
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function hueFor(id) { return CFG.HUE_MIN + (hashStr(id) % CFG.HUE_SPAN); }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = (hashStr(a[i].id + i) ) % (i + 1);  // deterministic-ish, no Math.random needed
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function showLoading(t) { $('loading-text').textContent = t || 'Loading…'; $('loading').classList.add('active'); }
function hideLoading() { $('loading').classList.remove('active'); }
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => { el.style.transition = 'opacity .3s'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, CFG.TOAST_MS);
}
function createTrackedObjectUrl(blob) { const u = URL.createObjectURL(blob); S.objectUrls.add(u); return u; }
function pruneUrlCache() {
  const now = Date.now(), keys = Object.keys(S.urlCache);
  if (keys.length <= CFG.URL_CACHE_MAX) return;
  for (const k of keys) if (S.urlCache[k].expires < now) delete S.urlCache[k];
  const rem = Object.entries(S.urlCache).sort((a, b) => a[1].expires - b[1].expires);
  while (rem.length > CFG.URL_CACHE_MAX) delete S.urlCache[rem.shift()[0]];
}

// ══════════════════════════════════════════════════════════════
//  AES-GCM credential encryption (ported from Tome)
// ══════════════════════════════════════════════════════════════
const Crypto = {
  async deriveKey(password, salt) {
    const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: CFG.PBKDF2_ITER, hash: 'SHA-256' },
      material, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
  },
  async encrypt(password, data) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await this.deriveKey(password, salt);
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(data)));
    return { salt: btoa(String.fromCharCode(...salt)), iv: btoa(String.fromCharCode(...iv)), ct: btoa(String.fromCharCode(...new Uint8Array(ct))) };
  },
  async decrypt(password, env) {
    const salt = Uint8Array.from(atob(env.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(env.iv), c => c.charCodeAt(0));
    const ct = Uint8Array.from(atob(env.ct), c => c.charCodeAt(0));
    const key = await this.deriveKey(password, salt);
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return JSON.parse(new TextDecoder().decode(pt));
  },
};

// ══════════════════════════════════════════════════════════════
//  AWS Signature V4 — pure-browser S3 client (ported from Tome)
// ══════════════════════════════════════════════════════════════
class S3Client {
  constructor({ endpoint, bucket, region, accessKey, secretKey }) {
    let ep = endpoint.replace(/\/$/, '').trim();
    if (!/^https?:\/\//i.test(ep)) ep = 'https://' + ep;
    this.endpoint = ep; this.bucket = bucket; this.region = region || 'us-east-1';
    this.accessKey = accessKey; this.secretKey = secretKey;
    this.pathStyle = !ep.includes('.amazonaws.com');
  }
  _buildUrl(objectPath) {
    if (this.pathStyle) {
      const fullPath = ('/' + this.bucket + objectPath).replace(/\/\//g, '/');
      const url = new URL(fullPath, this.endpoint);
      return { url, canonicalPath: url.pathname };
    }
    const parsed = new URL(this.endpoint);
    const url = new URL(objectPath, `${parsed.protocol}//${this.bucket}.${parsed.host}`);
    return { url, canonicalPath: url.pathname };
  }
  async _sha256(data) {
    if (typeof data === 'string') data = new TextEncoder().encode(data);
    const h = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async _hmac(key, msg) {
    if (typeof key === 'string') key = new TextEncoder().encode(key);
    if (typeof msg === 'string') msg = new TextEncoder().encode(msg);
    const ck = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
    return new Uint8Array(await crypto.subtle.sign('HMAC', ck, msg));
  }
  async _signingKey(dateStamp) {
    let k = await this._hmac(new TextEncoder().encode('AWS4' + this.secretKey), dateStamp);
    k = await this._hmac(k, this.region); k = await this._hmac(k, 's3');
    return this._hmac(k, 'aws4_request');
  }
  _amzDate() { return new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+Z$/, 'Z'); }
  _uriEncode(str, encodeSlash = true) {
    let out = '';
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      if (/[A-Za-z0-9_\-~.]/.test(ch)) { out += ch; continue; }
      if (ch === '/' && !encodeSlash) { out += ch; continue; }
      for (const b of new TextEncoder().encode(ch)) out += '%' + b.toString(16).toUpperCase().padStart(2, '0');
    }
    return out;
  }
  async signedRequest(method, path, { query = {}, headers = {}, body = '' } = {}) {
    const amzDate = this._amzDate(), dateStamp = amzDate.slice(0, 8);
    const scope = `${dateStamp}/${this.region}/s3/aws4_request`;
    const encodedPath = this._uriEncode(path, false);
    const { url, canonicalPath } = this._buildUrl(encodedPath);
    const qEntries = Object.entries(query).sort((a, b) => a[0].localeCompare(b[0]));
    const canonQuery = qEntries.map(([k, v]) => this._uriEncode(k) + '=' + this._uriEncode(v)).join('&');
    const requestUrl = url.origin + url.pathname + (canonQuery ? '?' + canonQuery : '');
    const bodyBytes = (body instanceof Uint8Array) ? body : (body || '');
    const payloadHash = await this._sha256(bodyBytes);
    const allHeaders = { host: url.host, 'x-amz-content-sha256': payloadHash, 'x-amz-date': amzDate, ...headers };
    if (body && method === 'PUT') allHeaders['content-type'] = headers['content-type'] || 'application/octet-stream';
    const signedKeys = Object.keys(allHeaders).sort();
    const signedHeadersStr = signedKeys.join(';');
    const canonHeaders = signedKeys.map(k => `${k}:${allHeaders[k]}\n`).join('');
    const canonReq = [method, canonicalPath, canonQuery, canonHeaders, signedHeadersStr, payloadHash].join('\n');
    const strToSign = ['AWS4-HMAC-SHA256', amzDate, scope, await this._sha256(canonReq)].join('\n');
    const sigKey = await this._signingKey(dateStamp);
    const sig = Array.from(await this._hmac(sigKey, strToSign)).map(b => b.toString(16).padStart(2, '0')).join('');
    allHeaders['Authorization'] = `AWS4-HMAC-SHA256 Credential=${this.accessKey}/${scope}, SignedHeaders=${signedHeadersStr}, Signature=${sig}`;
    delete allHeaders.host;
    const fetchBody = (method === 'GET' || method === 'HEAD') ? undefined : (bodyBytes || undefined);
    return fetch(requestUrl, { method, headers: allHeaders, body: fetchBody });
  }
  async listObjects(prefix = '', delimiter = '/') {
    const results = []; let token = null;
    do {
      const q = { 'list-type': '2', prefix, delimiter, 'max-keys': '1000' };
      if (token) q['continuation-token'] = token;
      const resp = await this.signedRequest('GET', '/', { query: q });
      if (!resp.ok) { const err = await resp.text().catch(() => ''); throw new Error(`ListObjects ${resp.status} — ${err.slice(0, 200)}`); }
      const xml = new DOMParser().parseFromString(await resp.text(), 'text/xml');
      if (xml.querySelector('parsererror')) break;
      for (const c of xml.getElementsByTagName('Contents')) {
        const keyEl = c.getElementsByTagName('Key')[0], sizeEl = c.getElementsByTagName('Size')[0];
        if (keyEl) results.push({ type: 'file', key: keyEl.textContent, size: sizeEl ? parseInt(sizeEl.textContent) : 0 });
      }
      for (const cp of xml.getElementsByTagName('CommonPrefixes')) {
        const pEl = cp.getElementsByTagName('Prefix')[0];
        if (pEl) results.push({ type: 'prefix', key: pEl.textContent });
      }
      const truncEl = xml.getElementsByTagName('IsTruncated')[0];
      token = (truncEl && truncEl.textContent === 'true') ? (xml.getElementsByTagName('NextContinuationToken')[0]?.textContent || null) : null;
    } while (token);
    return results;
  }
  async getJSON(key) { try { const r = await this.signedRequest('GET', '/' + key); return r.ok ? await r.json() : null; } catch { return null; } }
  async getSignedUrl(key, ttlSec = 3600) {
    if (S.urlCache[key] && S.urlCache[key].expires > Date.now()) return S.urlCache[key].url;
    const amzDate = this._amzDate(), dateStamp = amzDate.slice(0, 8);
    const scope = `${dateStamp}/${this.region}/s3/aws4_request`;
    const encodedPath = this._uriEncode('/' + key, false);
    const { url } = this._buildUrl(encodedPath);
    const canonicalPath = url.pathname;
    const params = {
      'X-Amz-Algorithm': 'AWS4-HMAC-SHA256',
      'X-Amz-Credential': `${this.accessKey}/${scope}`,
      'X-Amz-Date': amzDate, 'X-Amz-Expires': String(ttlSec), 'X-Amz-SignedHeaders': 'host',
    };
    const sorted = Object.entries(params).sort((a, b) => a[0].localeCompare(b[0]));
    const canonQuery = sorted.map(([k, v]) => this._uriEncode(k) + '=' + this._uriEncode(v)).join('&');
    const canonReq = ['GET', canonicalPath, canonQuery, `host:${url.host}\n`, 'host', 'UNSIGNED-PAYLOAD'].join('\n');
    const strToSign = ['AWS4-HMAC-SHA256', amzDate, scope, await this._sha256(canonReq)].join('\n');
    const sigKey = await this._signingKey(dateStamp);
    const sig = Array.from(await this._hmac(sigKey, strToSign)).map(b => b.toString(16).padStart(2, '0')).join('');
    const signed = url.origin + url.pathname + '?' + canonQuery + '&X-Amz-Signature=' + sig;
    S.urlCache[key] = { url: signed, expires: Date.now() + CFG.URL_CACHE_TTL };
    pruneUrlCache();
    return signed;
  }
}

// ══════════════════════════════════════════════════════════════
//  Library crawl (flat track list)
// ══════════════════════════════════════════════════════════════
function isAudioFile(key) { const l = key.toLowerCase(); return CFG.AUDIO_EXTS.some(e => l.endsWith(e)); }

async function crawlTracks() {
  showLoading('Scanning sounds…');
  const files = [], visited = new Set();
  async function walk(prefix) {
    if (visited.has(prefix)) return;
    visited.add(prefix);
    let items;
    try { items = await S.s3.listObjects(prefix, '/'); }
    catch (e) { console.warn('crawl', prefix, e.message); return; }
    for (const it of items) {
      if (it.type === 'file') files.push(it);
      else if (it.type === 'prefix') await walk(it.key);
    }
  }
  await walk('');

  let meta = null;
  if (files.some(f => f.key.toLowerCase() === 'metadata.json')) meta = await S.s3.getJSON('metadata.json');
  const lookup = (key) => {
    if (!meta) return {};
    if (Array.isArray(meta)) return meta.find(m => m.key === key) || {};
    if (meta.tracks && meta.tracks[key]) return meta.tracks[key];
    return meta[key] || {};
  };

  const audioFiles = files.filter(f => isAudioFile(f.key));
  S.tracks = audioFiles.map(f => {
    const base = f.key.split('/').pop().replace(/\.[^.]+$/, '');
    const m = lookup(f.key) || {};
    return {
      id: f.key, key: f.key, name: f.key.split('/').pop(), size: f.size,
      title: m.title || base,
      hue: (m.hue != null) ? m.hue : hueFor(f.key),
      duration: m.duration || null,
      cached: false,
    };
  }).sort((a, b) => naturalSort(a.title, b.title));

  S.byId = {};
  for (const t of S.tracks) S.byId[t.id] = t;
  preloadMetaFromCache(); // instant: restores title/artist/album/duration/artKey from localStorage

  hideLoading();
}

// ══════════════════════════════════════════════════════════════
//  OPFS offline cache (adapted from Tome — per-track)
// ══════════════════════════════════════════════════════════════
function trackDirName(t) { return 'snoozz-' + hashStr(t.id).toString(36); }

async function detectCached() {
  if (!navigator.storage?.getDirectory) return;
  try {
    const root = await navigator.storage.getDirectory();
    for (const t of S.tracks) {
      try { await root.getDirectoryHandle(trackDirName(t), { create: false }); t.cached = true; }
      catch { t.cached = false; }
    }
  } catch { /* OPFS unavailable */ }
}

async function downloadTrack(t) {
  if (!navigator.onLine) { toast('No network — cannot download'); return false; }
  if (navigator.storage?.persist) { try { await navigator.storage.persist(); } catch {} }
  toast('Downloading ' + t.title + '…');
  try {
    const root = await navigator.storage.getDirectory();
    const dir = await root.getDirectoryHandle(trackDirName(t), { create: true });
    const url = await S.s3.getSignedUrl(t.key);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const blob = await resp.blob();
    const fh = await dir.getFileHandle(t.name, { create: true });
    const wr = await fh.createWritable();
    await wr.write(blob); await wr.close();
    t.cached = true;
    toast(`Saved offline (${(blob.size / 1048576).toFixed(1)} MB)`);
    return true;
  } catch (e) {
    console.error('download', e);
    try { const root = await navigator.storage.getDirectory(); await root.removeEntry(trackDirName(t), { recursive: true }); } catch {}
    t.cached = false;
    toast('Download failed: ' + e.message);
    return false;
  }
}

async function removeCached(t) {
  try { const root = await navigator.storage.getDirectory(); await root.removeEntry(trackDirName(t), { recursive: true }); } catch {}
  t.cached = false;
}

async function openCachedFile(t) {
  const root = await navigator.storage.getDirectory();
  const dir = await root.getDirectoryHandle(trackDirName(t), { create: false });
  const fh = await dir.getFileHandle(t.name, { create: false });
  return fh.getFile();
}

// ══════════════════════════════════════════════════════════════
//  Audio engine
// ══════════════════════════════════════════════════════════════
function isPlayable(t) { return t.cached || S.connectivity === 'online'; }
function badgeKind(t) { return t.cached ? 'local' : (S.connectivity === 'offline' ? 'offline' : 'cloud'); }

async function getTrackUrl(t) {
  if (t.cached) { try { return createTrackedObjectUrl(await openCachedFile(t)); } catch { /* fall through */ } }
  return S.s3.getSignedUrl(t.key);
}

async function loadAndPlay(idx, autoplay) {
  const t = S.queue[idx];
  if (!t) return;
  S.queueIdx = idx; S.playingId = t.id;
  audioRetry = 0;
  const url = await getTrackUrl(t);
  if (!url) { toast('Cannot load track'); return; }
  audio.src = url;
  audio.volume = S.volume;
  audio.load();
  if (autoplay) { try { await audio.play(); S.isPlaying = true; } catch (e) { S.isPlaying = false; } }
  updateAllUI();
  updateMediaSession();
}

async function startQueue(trackObjs, { loop = true, timerMinutes = null } = {}) {
  if (!trackObjs.length) return;
  ensureFreshAudio(); // restore a pristine (hi-res, untainted) element if a prior fade used Web Audio
  S.queue = (S.timerPrefs.shuffle && timerMinutes && trackObjs.length > 1) ? shuffle(trackObjs) : trackObjs.slice();
  S.loopMode = loop;
  audio.volume = S.volume;
  await loadAndPlay(0, true);
  if (timerMinutes) startTimer(timerMinutes); else clearTimer();
  showMini();
  if (S.expanded) renderNowPlaying();
  renderGrid();
}

function playSingle(t) {
  if (!isPlayable(t)) { toast('Offline — open it and tap ↓ to download'); return; }
  startQueue([t], { loop: true, timerMinutes: null });
}

function handleEnded() {
  let next = S.queueIdx + 1;
  if (next >= S.queue.length) {
    if (!S.loopMode) { stopPlayback(); return; }
    if (S.timerPrefs.shuffle && S.queue.length > 1) S.queue = shuffle(S.queue);
    next = 0;
  }
  loadAndPlay(next, true);
}

function togglePlay() {
  if (!S.queue.length) return;
  if (audio.paused) { audio.play().then(() => { S.isPlaying = true; updateAllUI(); }).catch(() => {}); }
  else { audio.pause(); S.isPlaying = false; updateAllUI(); savePersist(); }
}

function stopPlayback() {
  audio.pause();
  S.isPlaying = false;
  clearTimer();
  updateAllUI();
  savePersist();
}

function nextTrack() {
  if (!S.queue.length) return;
  let n = S.queueIdx + 1; if (n >= S.queue.length) n = 0;
  loadAndPlay(n, true);
}
function prevTrack() {
  if (!S.queue.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let p = S.queueIdx - 1; if (p < 0) p = S.queue.length - 1;
  loadAndPlay(p, true);
}

// ══════════════════════════════════════════════════════════════
//  Sleep timer
// ══════════════════════════════════════════════════════════════
function startTimer(minutes) {
  clearTimer();
  S.timer.minutes = minutes;
  S.timer.endTime = Date.now() + minutes * 60000;
  S.timer.fadeWindowMs = S.timerPrefs.fadeOut ? Math.min(CFG.FADE_WINDOW_MS, minutes * 60000) : 0;
  S.timer.isRunning = true;
  S.tickId = setInterval(tickTimer, 250);
  tickTimer();
}
function clearTimer() {
  if (S.tickId) { clearInterval(S.tickId); S.tickId = null; }
  if (S.fadeId) { clearInterval(S.fadeId); S.fadeId = null; }
  cancelFade();
  S.timer.isRunning = false; S.timer.endTime = null; S.timer.minutes = null;
  $('np-ring').style.display = 'none';
}
function tickTimer() {
  if (!S.timer.endTime) return;
  const rem = S.timer.endTime - Date.now();
  updateTimerUI(rem);
  if (S.timer.fadeWindowMs && rem <= S.timer.fadeWindowMs && rem > 0 && !S._fadeStarted) startFade(rem);
  if (rem <= 0) finishTimer();
}
// Begin the fade-out. Prefer a Web Audio GainNode ramp (works on iOS, where
// audio.volume is ignored); fall back to a stepped audio.volume fade if Web Audio
// is unavailable. The GainNode path taints the element for hi-res — fine at end of session.
function startFade(remMs) {
  S._fadeStarted = true;
  const secs = Math.max(0.05, remMs / 1000);
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) throw new Error('no WebAudio');
    if (!audioCtx) {
      audioCtx = new Ctx();
      srcNode = audioCtx.createMediaElementSource(audio);
      gainNode = audioCtx.createGain();
      srcNode.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      waTainted = true;
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const startVol = Math.max(0.0001, S.volume);
    gainNode.gain.cancelScheduledValues(now);
    gainNode.gain.setValueAtTime(startVol, now);
    gainNode.gain.linearRampToValueAtTime(0.0001, now + secs);
  } catch (e) {
    // Fallback: stepped audio.volume fade (effective on desktop; silent no-op on iOS)
    console.warn('WebAudio fade unavailable, using volume fade', e.message);
    const startVol = S.volume, t0 = Date.now();
    S.fadeId = setInterval(() => {
      const frac = Math.min(1, (Date.now() - t0) / remMs);
      audio.volume = Math.max(0, startVol * (1 - frac));
      if (frac >= 1) { clearInterval(S.fadeId); S.fadeId = null; }
    }, CFG.FADE_STEP_MS);
  }
}
// Stop any in-progress fade and restore full level (both fade paths).
function cancelFade() {
  S._fadeStarted = false;
  if (S.fadeId) { clearInterval(S.fadeId); S.fadeId = null; }
  audio.volume = S.volume;
  if (gainNode && audioCtx) {
    try {
      const now = audioCtx.currentTime;
      gainNode.gain.cancelScheduledValues(now);
      gainNode.gain.setValueAtTime(S.volume, now);
    } catch {}
  }
}
function finishTimer() {
  audio.pause();
  S._fadeStarted = false;
  audio.volume = S.volume;
  S.isPlaying = false;
  clearTimer();
  updateAllUI();
  toast('Sleep timer ended');
  savePersist();
}
function extendTimer() {
  if (!S.timer.isRunning) { toast('No timer running'); return; }
  cancelFade();
  S.timer.endTime += 5 * 60000;
  toast('+5 minutes');
  tickTimer();
}

function enterSelectMode(firstId) {

function renderChips() {

  custom.dataset.custom = '1';

function syncToggles() {
  $('tg-fade').classList.toggle('on', S.timerPrefs.fadeOut);
  $('tg-shuffle').classList.toggle('on', S.timerPrefs.shuffle);
  $('tg-loop').classList.toggle('on', S.timerPrefs.loop);

function updateSheetCta() { $('sheet-cta').textContent = `Start ${S.timerPrefs.minutes}-min mix`; }
function openSheet() {

  renderChips(); syncToggles(); updateSheetCta();

function startTimerFromSheet() {

  closeSheet();
  savePersist();
  if (S.selectMode) {
    const tracks = S.mix.map(id => S.byId[id]).filter(t => t && isPlayable(t));
    if (!tracks.length) { toast('No playable tracks selected'); return; }

  } else if (S.queue.length) {
